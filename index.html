<!-- Bouton de sélection de langue fixe en haut à droite -->
<style>
#lang-button {
  position: fixed;
  top: 10px;
  right: 10px;
  background-color: #222;
  color: #fff;
  font-size: 16px;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background 0.3s;
}

#lang-button:hover { background-color: #444; }

#lang-menu {
  position: fixed;
  top: 50px;
  right: 10px;
  background-color: #222;
  color: #fff;
  border-radius: 8px;
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 8px;
  z-index: 998;
  animation: slideDown 0.3s ease forwards;
}

@keyframes slideDown {
  0% { opacity: 0; transform: translateY(-10px); }
  100% { opacity: 1; transform: translateY(0); }
}

.lang-option {
  background-color: #333;
  border: none;
  color: #fff;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
}

.lang-option:hover { background-color: #555; }
</style>

<button id="lang-button">🇫🇷 Français</button>

<div id="lang-menu">
  <button class="lang-option" data-lang="fr">🇫🇷 Français</button>
  <button class="lang-option" data-lang="en">🇬🇧 English</button>
</div>

<script>
const langButton = document.getElementById('lang-button');
const langMenu = document.getElementById('lang-menu');

// Ouverture / fermeture menu
langButton.addEventListener('click', () => {
  langMenu.style.display = langMenu.style.display === 'flex' ? 'none' : 'flex';
});

// Fonction principale
function changeLanguage(lang) {
  document.documentElement.lang = lang;

  const dateElements = document.querySelectorAll('.calendar-date'); 
  dateElements.forEach(el => {
    const currentDate = new Date(el.getAttribute('data-date')); 
    if(lang === 'en') {
      const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: 'numeric', minute: 'numeric', hour12: true };
      el.textContent = new Intl.DateTimeFormat('en-US', options).format(currentDate).replace(/-/g,'/');
      langButton.textContent = 'Traduire en : English';
    } else {
      const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false };
      el.textContent = new Intl.DateTimeFormat('fr-FR', options).format(currentDate).replace(/-/g,'/');
      langButton.textContent = 'Traduire en : Français';
    }
  });

  langMenu.style.display = 'none';
}

// Sélection dans le menu
document.querySelectorAll('.lang-option').forEach(btn => {
  btn.addEventListener('click', () => {
    const lang = btn.getAttribute('data-lang');
    changeLanguage(lang);
  });
});
</script>
